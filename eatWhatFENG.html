<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>这顿吃什么?</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box;}

        body {
            background-image: linear-gradient(to right, #eea2a2 0%, #bbc1bf 19%, #57c6e1 42%, #b49fda 79%, #7ac5d8 100%);
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
        }

        .container { max-width: 500px; margin: 0 auto; }

        .main-card {
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header { text-align: center; margin-bottom: 20px; }

        .header h1 { font-size: 26px; }

        .section { margin-bottom: 20px; }

        .options { display: flex; flex-wrap: wrap; gap: 10px; }

        .option-btn {
            padding: 10px 18px;
            border-radius: 50px;
            background: #f5f5f5;
            border: none;
            cursor: pointer;
        }

        .option-btn.active {
            background: linear-gradient(to right, #bebed7, #8c8cda);
            color: white;
        }

        .decision-btn {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(to right, #a7a6cb, #8989ba);
            color: white;
            font-size: 16px;
            margin-top: 10px;
        }

        .result-card {
            display: none;
            margin-top: 20px;
            background: #f5f5f5;
            border-radius: 20px;
            padding: 20px;
        }

        .result-card.show { display: block; }

        .food-name {
            font-size: 22px;
            text-align: center;
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            margin-bottom: 8px;
        }

        .info-label { width: 60px; }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-secondary {
            flex: 1;
            padding: 10px;
            border-radius: 50px;
            border: none;
            color: white;
        }

        .btn-refresh { background: #e185aa; }
        .btn-back { background: #95a5a6; }

        .history-section { margin-top: 20px; }

        .history-list {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 10px;
        }

        .history-item {
            background: white;
            margin-bottom: 6px;
            padding: 8px;
            border-radius: 10px;
            font-size: 12px;
        }
    </style>
</head>

<body>
<div class="container">

<div class="main-card">

<div class="header">
    <h1>🍽️ 今天吃什么</h1>
</div>

<!-- 口味 -->
<div class="section">
    <div>1. 口味</div>
    <div class="options" id="tasteOptions"></div>
</div>

<!-- 用餐方式 -->
<div class="section">
    <div>2. 用餐方式</div>
    <div class="options" id="methodOptions"></div>
</div>

<button class="decision-btn" id="decisionBtn">🎲 随机推荐一个吧！</button>

<div class="result-card" id="resultCard">
    <div class="food-name" id="foodName"></div>

    <div class="info-row">
        <div class="info-label">你想吃：</div>
        <div id="foodTaste"></div>
    </div>

    <div class="info-row">
        <div class="info-label">方式：</div>
        <div id="foodMethod"></div>
    </div>

    <div class="action-buttons">
        <button class="btn-secondary btn-refresh" id="refreshBtn">换一个</button>
        <button class="btn-secondary btn-back" id="backBtn">重新筛选</button>
    </div>
</div>

</div>

<!-- 历史 -->
<div class="history-section">
    <div class="history-list" id="historyList"></div>
</div>

</div>

<script>

// 菜单
const menuData = [
{ name:"牛肉丸汤饭",taste:"清淡",method:"堂食"},
{ name:"双丸汤饭",taste:"清淡",method:"堂食"},
{ name:"瘦肉汤饭",taste:"清淡",method:"堂食"},
{ name:"腌米粉",taste:"清淡",method:"堂食"},
{ name:"台式卤肉饭",taste:"清淡",method:"堂食"},
{ name:"袁记云饺",taste:"清淡",method:"外卖"},
{ name:"手撕鸡饭",taste:"清淡",method:"堂食"},
{ name:"蜜汁鸡翅",taste:"清淡",method:"堂食"},
{ name:"烧鸭饭",taste:"清淡",method:"堂食"},
{ name:"叉烧饭",taste:"清淡",method:"堂食"},
{ name:"豉油鸡",taste:"清淡",method:"堂食"},
{ name:"白切鸡腿饭",taste:"清淡",method:"堂食"},
{ name:"板烧鸡腿堡",taste:"清淡",method:"堂食或外卖"},
{ name:"瘦肉肠粉",taste:"清淡",method:"堂食"},
{ name:"双层鳕鱼堡",taste:"清淡",method:"外卖"},
{ name:"麦辣鸡腿堡",taste:"辣",method:"堂食"},
{ name:"不素之霸双层牛堡",taste:"清淡",method:"外卖"},
{ name:"湘小悦",taste:"辣",method:"外卖"},
{ name:"同湘会馆香豆豉虎皮辣椒炒肉",taste:"油",method:"外卖"},
{ name:"同湘会馆香辣鱼",taste:"油辣",method:"外卖"},
{ name:"同湘会馆胡萝卜炒肉",taste:"油",method:"外卖"},
{ name:"paperstone吐司",taste:"甜食",method:"外卖"},
{ name:"paperstone巴斯克套餐",taste:"甜食",method:"外卖"},
{ name:"海底捞拌饭",taste:"清淡",method:"外卖"},
{ name:"真功夫土豆牛腩",taste:"清淡",method:"外卖"},
{ name:"沅江水炒牛肉",taste:"油",method:"外卖"},
{ name:"沅江水小炒肉",taste:"油",method:"外卖"},
{ name:"沅江水小炒鸡",taste:"油",method:"外卖"},
{ name:"沅江水红烧鱼",taste:"油辣",method:"外卖"},
{ name:"锅包肉",taste:"清淡",method:"外卖"},
{ name:"711关东煮",taste:"清淡",method:"堂食或外卖"},
{ name:"鸡排咖喱饭",taste:"清淡",method:"外卖"},
{ name:"猪排咖喱饭",taste:"清淡",method:"外卖"},
{ name:"牛腩面",taste:"清淡",method:"堂食"},
{ name:"麻辣香锅",taste:"油",method:"堂食"},
{ name:"羊杂面",taste:"清淡",method:"外卖"}
];

// 选项
const tasteOptions = ["不限","清淡","油","辣","甜食"];
const methodOptions = ["不限","堂食","外卖"];

let selectedTaste="不限";
let selectedMethod="不限";
let currentRecommendation=null;
let history=[];

// 渲染按钮
function renderOptions(){
    document.getElementById("tasteOptions").innerHTML =
    tasteOptions.map(opt=>`<button class="option-btn ${selectedTaste===opt?'active':''}" data-type="taste" data-value="${opt}">${opt}</button>`).join('');

    document.getElementById("methodOptions").innerHTML =
    methodOptions.map(opt=>`<button class="option-btn ${selectedMethod===opt?'active':''}" data-type="method" data-value="${opt}">${opt}</button>`).join('');

    document.querySelectorAll('.option-btn').forEach(btn=>{
        btn.onclick=()=>{
            const type=btn.dataset.type;
            const val=btn.dataset.value;
            if(type==="taste") selectedTaste=val;
            if(type==="method") selectedMethod=val;
            renderOptions();
            document.getElementById('resultCard').classList.remove('show');
        }
    });
}

// 筛选
function filterData(){
    let data=menuData;

    if(selectedTaste!=="不限"){
        data=data.filter(i=>i.taste.includes(selectedTaste));
    }

    if(selectedMethod!=="不限"){
        data=data.filter(i=>i.method.includes(selectedMethod));
    }

    return data;
}

// 推荐
function randomRecommend(){
    const list=filterData();
    if(list.length===0){ alert("没有符合条件的，试试放宽条件吧！"); return;}
    const food=list[Math.floor(Math.random()*list.length)];
    show(food);
}

function show(food){
    currentRecommendation=food;
    document.getElementById("foodName").textContent=food.name;
    document.getElementById("foodTaste").textContent=food.taste;
    document.getElementById("foodMethod").textContent=food.method;
    document.getElementById("resultCard").classList.add("show");

    history.unshift(food.name);
    renderHistory();
}

function renderHistory(){
    document.getElementById("historyList").innerHTML =
    history.slice(0,10).map(i=>`<div class="history-item">${i}</div>`).join('');
}

// 按钮
document.getElementById("decisionBtn").onclick=randomRecommend;
document.getElementById("refreshBtn").onclick=randomRecommend;
document.getElementById("backBtn").onclick=()=>{
    document.getElementById("resultCard").classList.remove("show");
};

// 初始化
renderOptions();

</script>

</body>
</html>
